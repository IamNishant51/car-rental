server:
  port: ${PORT:8081}

spring:
  application:
    name: vehicle-rental
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/vehicle_rental?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}
  jackson:
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:7a2d3e8f9b1c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d}
    expiration-ms: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.rental: INFO
    org.springframework.security: WARN
